<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Contraction Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0fa;
    --purple: #9b6dbd;
    --purple-dark: #6b3d9a;
    --purple-deep: #4a2070;
    --purple-light: #e8d8f5;
    --purple-glow: rgba(155,109,189,0.12);
    --text: #2a1040;
    --text-soft: #6a4a8a;
    --text-muted: #b09ac0;
    --card: #fdf8ff;
    --border: #e5d0f5;
    --red: #c45;
    --red-soft: #fdeaea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* TOP BAR */
  .topbar {
    width: 100%;
    background: var(--purple-dark);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 16px rgba(107,61,154,0.3);
    z-index: 10;
  }
  .topbar-title { font-size: 0.95rem; font-weight: 600; color: white; letter-spacing: 0.12em; text-transform: uppercase; }
  .topbar-clear { position: absolute; right: 20px; background: none; border: none; color: rgba(255,255,255,0.7); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; cursor: pointer; font-weight: 500; }

  /* SUMMARY STRIP */
  .summary-strip {
    width: 100%;
    background: var(--purple-deep);
    padding: 10px 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    flex-shrink: 0;
  }
  .summary-cell { text-align: center; border-right: 1px solid rgba(255,255,255,0.12); }
  .summary-cell:last-child { border-right: none; }
  .summary-val { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: white; line-height: 1; font-style: italic; }
  .summary-lbl { font-size: 0.6rem; color: rgba(255,255,255,0.6); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* SCROLLABLE LOG */
  .log-scroll {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 20px 12px;
    background: var(--bg);
  }

  .alert-banner {
    display: none;
    background: var(--red-soft);
    border: 1.5px solid var(--red);
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
    margin-bottom: 12px;
    animation: pulse-alert 1.5s ease-in-out infinite;
  }
  .alert-banner.visible { display: block; }
  @keyframes pulse-alert {
    0%, 100% { box-shadow: 0 0 0 0 rgba(204,68,85,0.2); }
    50% { box-shadow: 0 0 0 6px rgba(204,68,85,0); }
  }
  .alert-title { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--red); }
  .alert-sub { font-size: 0.74rem; color: var(--red); margin-top: 2px; }

  .list-header {
    display: grid;
    grid-template-columns: 44px 1fr 80px 80px;
    padding: 4px 12px;
    margin-bottom: 6px;
  }
  .list-header-cell { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); text-align: center; }
  .list-header-cell:first-child { text-align: left; }

  .contraction-row {
    display: grid;
    grid-template-columns: 44px 1fr 80px 80px;
    align-items: center;
    background: var(--card);
    border-radius: 12px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    animation: row-in 0.25s ease;
  }
  @keyframes row-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .contraction-row.current { border-color: var(--purple); background: var(--purple-glow); }

  .row-num {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    color: white; font-family: 'DM Serif Display', serif; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center; font-style: italic;
  }
  .row-num.current {
    background: linear-gradient(135deg, var(--purple-dark), var(--purple-deep));
    animation: pulse-num 1.5s ease-in-out infinite;
  }
  @keyframes pulse-num {
    0%, 100% { box-shadow: 0 0 0 0 rgba(155,109,189,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(155,109,189,0); }
  }
  .row-time { font-size: 0.78rem; color: var(--text-soft); text-align: center; }
  .row-dur { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--text); text-align: center; font-style: italic; }
  .row-dur.live { color: var(--purple-dark); }
  .row-freq { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--text-soft); text-align: center; font-style: italic; }

  .connector { display: flex; justify-content: flex-start; padding-left: 32px; }
  .connector-line { width: 2px; height: 8px; background: var(--purple-light); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 0.85rem; font-style: italic; line-height: 1.6; }

  /* BOTTOM PANEL */
  .bottom-panel {
    width: 100%;
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 16px 20px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .tap-btn {
    width: 130px; height: 130px; border-radius: 50%; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 600; color: white;
    letter-spacing: 0.06em; text-transform: uppercase;
    background: radial-gradient(circle at 38% 35%, #c49de0, var(--purple) 55%, var(--purple-dark));
    box-shadow: 0 6px 28px rgba(107,61,154,0.4), 0 0 0 10px rgba(155,109,189,0.1);
    transition: transform 0.1s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    position: relative; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  .tap-btn:active { transform: scale(0.95); }
  .tap-btn.active {
    background: radial-gradient(circle at 38% 35%, #a070c8, var(--purple-dark) 55%, var(--purple-deep));
    animation: pulse-ring 1.8s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 6px 28px rgba(107,61,154,0.4), 0 0 0 10px rgba(155,109,189,0.1); }
    50% { box-shadow: 0 6px 28px rgba(107,61,154,0.5), 0 0 0 20px rgba(155,109,189,0.03); }
  }
  .tap-btn-text { font-size: 0.78rem; line-height: 1; }
  .tap-btn-sub { font-size: 0.6rem; font-weight: 400; opacity: 0.85; letter-spacing: 0.08em; }
  .tap-btn .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.25); transform: scale(0); animation: ripple 0.6s linear; pointer-events: none; }
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }

  .live-dur {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--purple-dark);
    font-style: italic;
    min-height: 24px;
    text-align: center;
  }
  .note { font-size: 0.65rem; color: var(--text-muted); text-align: center; line-height: 1.4; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Contractions</div>
  <button class="topbar-clear" onclick="clearAll()">Clear</button>
</div>

<div class="summary-strip">
  <div class="summary-cell">
    <div class="summary-val" id="sumCount">—</div>
    <div class="summary-lbl">Last hour</div>
  </div>
  <div class="summary-cell">
    <div class="summary-val" id="sumAvgDur">—</div>
    <div class="summary-lbl">Avg duration</div>
  </div>
  <div class="summary-cell">
    <div class="summary-val" id="sumAvgFreq">—</div>
    <div class="summary-lbl">Avg frequency</div>
  </div>
</div>

<div class="log-scroll" id="logScroll">
  <div class="alert-banner" id="alertBanner">
    <div class="alert-title">🏥 Time to go to hospital</div>
    <div class="alert-sub">5-1-1 pattern — call your midwife now</div>
  </div>
  <div class="list-header">
    <div class="list-header-cell"></div>
    <div class="list-header-cell">Time</div>
    <div class="list-header-cell">Duration</div>
    <div class="list-header-cell">Frequency</div>
  </div>
  <div id="contractionList">
    <div class="empty-state">No contractions yet.<br>Tap the button below when one begins.</div>
  </div>
</div>

<div class="bottom-panel">
  <button class="tap-btn" id="tapBtn" onclick="handleTap(event)">
    <span class="tap-btn-text" id="tapText">CONTRACTION</span>
    <span class="tap-btn-sub" id="tapSub">tap to start</span>
  </button>
  <div class="live-dur" id="liveDur"></div>
  <div class="note">Always follow your midwife's guidance · Not medical advice</div>
</div>

<script>
  let contractions = [];
  let state = 'idle';
  let contractionStart = null;
  let liveInterval = null;

  function fmt(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m > 0 ? `${m}:${sec.toString().padStart(2,'0')}` : `0:${sec.toString().padStart(2,'0')}`;
  }

  function fmtShort(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m > 0 ? `${m}m${sec > 0 ? sec+'s' : ''}` : `${sec}s`;
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function handleTap(e) {
    const btn = document.getElementById('tapBtn');
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
    if (state === 'idle') startContraction();
    else endContraction();
  }

  function startContraction() {
    state = 'contracting';
    contractionStart = Date.now();
    document.getElementById('tapBtn').classList.add('active');
    document.getElementById('tapSub').textContent = 'tap to end';
    liveInterval = setInterval(() => {
      const elapsed = Date.now() - contractionStart;
      document.getElementById('liveDur').textContent = fmt(elapsed);
      const liveEl = document.querySelector('.row-dur.live');
      if (liveEl) liveEl.textContent = fmt(elapsed);
    }, 500);
    renderList(true);
  }

  function endContraction() {
    state = 'idle';
    const now = Date.now();
    const duration = now - contractionStart;
    let frequency = null;
    if (contractions.length > 0) frequency = contractionStart - contractions[contractions.length - 1].start;
    contractions.push({ start: contractionStart, duration, frequency });
    clearInterval(liveInterval);
    document.getElementById('tapBtn').classList.remove('active');
    document.getElementById('tapSub').textContent = 'tap to start';
    document.getElementById('liveDur').textContent = '';
    renderList(false);
    updateSummary();
    check511();
  }

  function renderList(withCurrent) {
    const list = document.getElementById('contractionList');
    if (contractions.length === 0 && !withCurrent) {
      list.innerHTML = '<div class="empty-state">No contractions yet.<br>Tap the button below when one begins.</div>';
      return;
    }
    let html = '';
    const total = contractions.length + (withCurrent ? 1 : 0);
    if (withCurrent) {
      html += `<div class="contraction-row current">
        <div class="row-num current">${total}</div>
        <div class="row-time">${fmtTime(contractionStart)}</div>
        <div class="row-dur live">0:00</div>
        <div class="row-freq">—</div>
      </div>`;
      if (contractions.length > 0) html += `<div class="connector"><div class="connector-line"></div></div>`;
    }
    const reversed = [...contractions].reverse();
    reversed.forEach((c, i) => {
      const num = contractions.length - i;
      const isLast = i === reversed.length - 1;
      html += `<div class="contraction-row">
        <div class="row-num">${num}</div>
        <div class="row-time">${fmtTime(c.start)}</div>
        <div class="row-dur">${fmt(c.duration)}</div>
        <div class="row-freq">${c.frequency !== null ? fmt(c.frequency) : '—'}</div>
      </div>`;
      if (!isLast) html += `<div class="connector"><div class="connector-line"></div></div>`;
    });
    list.innerHTML = html;
  }

  function updateSummary() {
    const now = Date.now();
    const lastHour = contractions.filter(c => (now - c.start) <= 3600000);
    document.getElementById('sumCount').textContent = lastHour.length || '—';
    if (lastHour.length > 0) {
      document.getElementById('sumAvgDur').textContent = fmtShort(lastHour.reduce((a,c) => a+c.duration,0)/lastHour.length);
    } else document.getElementById('sumAvgDur').textContent = '—';
    const freqs = lastHour.filter(c => c.frequency !== null).map(c => c.frequency);
    if (freqs.length > 0) {
      document.getElementById('sumAvgFreq').textContent = fmtShort(freqs.reduce((a,b)=>a+b,0)/freqs.length);
    } else document.getElementById('sumAvgFreq').textContent = '—';
  }

  function check511() {
    const now = Date.now();
    const recent = contractions.filter(c => (now - c.start) <= 3600000);
    if (recent.length < 2) { document.getElementById('alertBanner').classList.remove('visible'); return; }
    const intervals = recent.filter(c => c.frequency !== null).map(c => c.frequency);
    const avgInterval = intervals.length > 0 ? intervals.reduce((a,b)=>a+b,0)/intervals.length : null;
    const avgDur = recent.map(c => c.duration).reduce((a,b)=>a+b,0) / recent.length;
    const windowSpan = now - recent[0].start;
    if (avgInterval !== null && avgInterval <= 5*60*1000 && avgDur >= 60*1000 && windowSpan >= 60*60*1000) {
      document.getElementById('alertBanner').classList.add('visible');
    } else {
      document.getElementById('alertBanner').classList.remove('visible');
    }
  }

  function clearAll() {
    if (contractions.length === 0 && state === 'idle') return;
    if (!confirm('Clear all contractions?')) return;
    contractions = []; state = 'idle';
    clearInterval(liveInterval);
    document.getElementById('tapBtn').classList.remove('active');
    document.getElementById('tapSub').textContent = 'tap to start';
    document.getElementById('liveDur').textContent = '';
    document.getElementById('sumCount').textContent = '—';
    document.getElementById('sumAvgDur').textContent = '—';
    document.getElementById('sumAvgFreq').textContent = '—';
    document.getElementById('alertBanner').classList.remove('visible');
    renderList(false);
  }

  if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
</script>
</body>
</html>
